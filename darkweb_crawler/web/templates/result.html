<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkweb Crawler - 분석 결과</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        button, a.button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .btn-download {
            background: white;
            color: #667eea;
            border: none;
        }
        
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .content {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .report-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            min-height: 600px;
        }
        
        .report-iframe {
            width: 100%;
            height: 1000px;
            border: none;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 600px;
            background: white;
            border-radius: 10px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #f5c6cb;
            margin-bottom: 20px;
        }
        
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #c3e6cb;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button, a.button {
                width: 100%;
                text-align: center;
            }
            
            .report-iframe {
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 분석 결과: <span id="domainName"></span></h1>
        <p id="domainInfo" style="display: none;"></p>
        <div class="button-group">
            <a href="/" class="button btn-back">← 돌아가기</a>
            <button class="btn-download" id="downloadBtn" style="display: none;">
                ⬇️ 보고서 다운로드
            </button>
        </div>
    </div>
    
    <div class="content">
        <div id="loadingContainer" class="loading" style="display: flex;">
            <div class="spinner"></div>
            <p>보고서를 로드 중입니다...</p>
        </div>
        
        <div id="errorContainer" class="error-message" style="display: none;"></div>
        
        <div class="report-container" id="reportContainer" style="display: none;">
            <iframe 
                id="reportIframe" 
                class="report-iframe" 
                title="분석 보고서"
                sandbox="allow-same-origin allow-styles allow-scripts"
            ></iframe>
        </div>
    </div>
    
    <script>
        // URL에서 도메인 파라미터 추출
        function getDomainFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('domain');
        }
        
        // 보고서 로드
        function loadReport() {
            const domain = getDomainFromURL();
            
            if (!domain) {
                showError('도메인 파라미터가 없습니다');
                return;
            }
            
            document.getElementById('domainName').textContent = domain;
            
            // API에서 보고서 조회
            fetch(`/api/report/${encodeURIComponent(domain)}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.text();
                })
                .then(html => {
                    document.getElementById('loadingContainer').style.display = 'none';
                    document.getElementById('reportContainer').style.display = 'block';
                    
                    // iframe에 콘텐츠 작성
                    const iframe = document.getElementById('reportIframe');
                    iframe.contentDocument.open();
                    iframe.contentDocument.write(html);
                    iframe.contentDocument.close();
                    
                    // 다운로드 버튼 표시
                    document.getElementById('downloadBtn').style.display = 'inline-block';
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('loadingContainer').style.display = 'none';
                    showError(`보고서를 불러올 수 없습니다: ${error.message}`);
                });
        }
        
        // 에러 메시지 표시
        function showError(message) {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.textContent = `❌ ${message}`;
            errorContainer.style.display = 'block';
        }
        
        // 다운로드 버튼 클릭
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const domain = getDomainFromURL();
            const iframe = document.getElementById('reportIframe');
            const html = iframe.contentDocument.documentElement.outerHTML;
            
            // Blob 생성
            const blob = new Blob([html], { type: 'text/html;charset=utf-8;' });
            
            // 다운로드 링크 생성
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `${domain}_analysis_report.html`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
        
        // 페이지 로드 시
        document.addEventListener('DOMContentLoaded', loadReport);
    </script>
</body>
</html>
