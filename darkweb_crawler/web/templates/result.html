<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darkweb Analyzer - 분석 결과</title>

    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #070816; --line: rgba(255,255,255,0.11); --text: #f9fafb;
            --sub: #9ca3af; --muted: #667085; --primary: #6366f1;
            --primary-hover: #4f46e5; --purple: #8b5cf6;
        }

        html, body { height: 100%; }

        body {
            font-family: "Pretendard", sans-serif;
            background:
                radial-gradient(circle at 18% 8%,  rgba(139,92,246,0.28), transparent 36%),
                radial-gradient(circle at 85% 18%, rgba(236,72,153,0.18), transparent 34%),
                radial-gradient(circle at 68% 90%, rgba(56,189,248,0.14), transparent 36%),
                linear-gradient(135deg, #070816 0%, #0b1020 55%, #090916 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            animation: bgMove 14s ease-in-out infinite alternate;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent 80%);
            pointer-events: none; z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        /* nav */
        .nav {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 48px;
            border-bottom: 1px solid var(--line);
            background: rgba(7,8,22,0.75);
            backdrop-filter: blur(20px);
        }

        .logo-wrap { display: flex; align-items: center; gap: 14px; }

        .logo {
            width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            position: relative; animation: logoPulse 3s ease-in-out infinite;
        }
        .logo::after {
            content: ""; position: absolute; inset: 9px;
            border: 2px solid white; border-radius: 3px;
        }

        .brand { font-weight: 700; font-size: 15px; }
        .brand-sub { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: #6b7280; margin-top: 1px; }

        .nav-actions { display: flex; gap: 12px; }

        .btn {
            height: 44px; padding: 0 22px; border: none; border-radius: 8px;
            font-family: inherit; font-size: 14px; font-weight: 700;
            cursor: pointer; text-decoration: none; display: inline-flex;
            align-items: center; justify-content: center; transition: 0.22s ease;
        }
        .btn-back     { background: rgba(255,255,255,0.05); color: #d1d5db; border: 1px solid var(--line); }
        .btn-back:hover { background: rgba(255,255,255,0.09); transform: translateY(-1px); }
        .btn-download { background: linear-gradient(135deg, var(--primary), var(--purple)); color: white; }
        .btn-download:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 10px 28px rgba(99,102,241,0.3); }

        /* page body */
        .page {
            position: relative; z-index: 1;
            max-width: 1400px; margin: 0 auto;
            padding: 36px 48px 60px;
            animation: pageEnter 0.7s ease both;
        }

        /* domain header card */
        .domain-card {
            background: linear-gradient(135deg, rgba(17,24,39,0.95), rgba(15,23,42,0.98));
            border: 1px solid var(--line); border-radius: 16px;
            padding: 36px 44px; margin-bottom: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            animation: cardEnter 0.8s ease both;
        }

        .domain-label { font-size: 12px; font-weight: 700; letter-spacing: 0.18em; color: #818cf8; margin-bottom: 12px; }

        .domain-name {
            font-size: 32px; font-weight: 900;
            letter-spacing: -0.8px; color: #f9fafb;
            word-break: break-all; margin-bottom: 6px;
        }

        .domain-time { font-size: 14px; color: var(--muted); }

        /* loading */
        .loading {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 400px;
            background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.98));
            border: 1px solid var(--line); border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            backdrop-filter: blur(18px);
        }

        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: var(--primary); border-radius: 50%;
            margin-bottom: 18px; animation: spin 0.8s linear infinite;
        }

        .loading p { color: #9ca3af; font-size: 15px; }

        /* report frame */
        .report-wrap {
            background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(15,23,42,0.98));
            border: 1px solid var(--line); border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
            backdrop-filter: blur(18px); overflow: hidden;
            animation: fadeUp 0.6s ease both; animation-delay: 0.1s;
        }

        .report-iframe { width: 100%; min-height: 600px; border: none; display: block; }

        /* error */
        .error-msg {
            display: none;
            background: rgba(239,68,68,0.1); color: #fca5a5;
            padding: 24px; border-radius: 12px;
            border: 1px solid rgba(239,68,68,0.2);
            font-size: 15px; font-weight: 600;
            animation: fadeUp 0.4s ease both;
        }

        @keyframes pageEnter { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
        @keyframes cardEnter  { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        @keyframes fadeUp     { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
        @keyframes bgMove     { from { background-position: 0% 0%; } to { background-position: 20px 30px; } }
        @keyframes gridMove   { from { background-position: 0 0; } to { background-position: 48px 48px; } }
        @keyframes logoPulse  { 0%,100% { box-shadow: 0 0 0 rgba(99,102,241,0); } 50% { box-shadow: 0 0 24px rgba(99,102,241,0.42); } }
        @keyframes spin       { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .nav { padding: 16px 24px; }
            .nav-actions .btn-download { display: none; }
            .page { padding: 24px 20px 40px; }
            .domain-card { padding: 28px 24px; }
            .domain-name { font-size: 22px; }
        }
    </style>
</head>

<body>

    <nav class="nav">
        <div class="logo-wrap">
            <div class="logo"></div>
            <div>
                <div class="brand">Darkweb Analyzer</div>
                <div class="brand-sub">SECURITY ANALYSIS SYSTEM</div>
            </div>
        </div>
        <div class="nav-actions">
            <a href="/" class="btn btn-back">← 돌아가기</a>
            <button class="btn btn-download" id="downloadBtn" style="display:none;">보고서 다운로드</button>
        </div>
    </nav>

    <div class="page">

        <div class="domain-card">
            <div class="domain-label">ANALYSIS REPORT</div>
            <div class="domain-name" id="domainName"></div>
            <div class="domain-time" id="domainTime"></div>
        </div>

        <div id="loadingContainer" class="loading">
            <div class="spinner"></div>
            <p>보고서를 불러오는 중입니다…</p>
        </div>

        <div id="errorContainer" class="error-msg"></div>

        <div class="report-wrap" id="reportWrap" style="display:none;">
            <iframe
                id="reportIframe"
                class="report-iframe"
                title="분석 보고서"
                sandbox="allow-same-origin allow-scripts"
            ></iframe>
        </div>

    </div>

    <script>
        function getDomain() {
            return new URLSearchParams(window.location.search).get("domain");
        }

        function showError(msg) {
            document.getElementById("loadingContainer").style.display = "none";
            const el = document.getElementById("errorContainer");
            el.textContent = "❌ " + msg;
            el.style.display = "block";
        }

        function autoResizeIframe(iframe) {
            try {
                const doc = iframe.contentDocument || iframe.contentWindow.document;
                const h = doc.documentElement.scrollHeight || doc.body.scrollHeight;
                iframe.style.height = (h + 32) + "px";
            } catch (e) {}
        }

        function loadReport() {
            const domain = getDomain();
            if (!domain) { showError("도메인 파라미터가 없습니다."); return; }

            document.getElementById("domainName").textContent = domain;
            document.getElementById("domainTime").textContent = "분석 시각: " + new Date().toLocaleString("ko-KR");

            fetch(`/api/report/${encodeURIComponent(domain)}`)
                .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
                .then(html => {
                    document.getElementById("loadingContainer").style.display = "none";
                    const wrap = document.getElementById("reportWrap");
                    wrap.style.display = "block";

                    const iframe = document.getElementById("reportIframe");
                    iframe.contentDocument.open();
                    iframe.contentDocument.write(html);
                    iframe.contentDocument.close();

                    // auto-resize after content renders
                    iframe.addEventListener("load", () => autoResizeIframe(iframe));
                    setTimeout(() => autoResizeIframe(iframe), 400);
                    setTimeout(() => autoResizeIframe(iframe), 1200);

                    document.getElementById("downloadBtn").style.display = "inline-flex";
                })
                .catch(err => showError(`보고서를 불러올 수 없습니다: ${err.message}`));
        }

        document.getElementById("downloadBtn").addEventListener("click", () => {
            const domain = getDomain();
            const iframe = document.getElementById("reportIframe");
            const html = iframe.contentDocument.documentElement.outerHTML;
            const blob = new Blob([html], { type: "text/html;charset=utf-8;" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `${domain}_report.html`;
            a.click();
        });

        document.addEventListener("DOMContentLoaded", loadReport);
    </script>
</body>
</html>
